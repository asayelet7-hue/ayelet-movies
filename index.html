<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הקרנה פרטית אילת</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3418/3418886.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #080a10;
            --accent: #e50914;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--primary); color: var(--text); padding-bottom: 50px; }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .header-actions { display: flex; gap: 10px; align-items: center; }

        button { cursor: pointer; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-cloud { background: #0284c7; color: white; }
        .btn-cancel { background: #475569; color: white; }
        .btn-danger { background: #ef4444; color: white; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }

        .card { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-body { padding: 1rem; display: flex; flex-direction: column; flex-grow: 1; gap: 8px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 500px; padding: 1.5rem; display: flex; flex-direction: column; gap: 12px; }
        input, select { width: 100%; padding: 10px; background: var(--primary); border: 1px solid var(--border); color: var(--text); border-radius: 6px; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-film"></i><span>הקרנה פרטית אילת</span></div>
        <div class="header-actions">
            <button class="btn-primary" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> הוסף תוכן</button>
            <button class="btn-cloud" onclick="openCloudModal()"><i class="fa-solid fa-cloud"></i> חיבור לענן</button>
            <button class="btn-cancel" id="adminLoginBtn" onclick="toggleAdminLogin()"><i class="fa-solid fa-user-shield"></i> התחבר כמנהל</button>
        </div>
    </header>

    <div class="container">
        <h2>הסרטים והסדרות שלנו</h2>
        <div id="contentGrid" class="grid"></div>
    </div>

    <div id="addModal" class="modal-overlay">
        <div class="modal">
            <h3>הוספת סרט / סדרה</h3>
            <input type="text" id="titleInput" placeholder="שם הסרט/הסדרה">
            <select id="typeSelect" onchange="handleTypeChange()">
                <option value="movie">סרט</option>
                <option value="series">סדרה</option>
            </select>
            <input type="url" id="imageInput" placeholder="קישור לתמונה">
            <div id="movieUrlContainer"><input type="url" id="movieUrlInput" placeholder="קישור לצפייה בסרט"></div>
            <div id="seriesContainer" style="display: none;">
                <input type="number" id="seasonsCount" value="1" min="1" max="20" placeholder="מספר עונות" onchange="generateSeasonInputs()">
                <div id="seasonsInputsContainer"></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-primary" style="flex: 1;" onclick="saveContent()">שמור</button>
                <button class="btn-cancel" style="flex: 1;" onclick="closeModal('addModal')">ביטול</button>
            </div>
        </div>
    </div>

    <div id="cloudModal" class="modal-overlay">
        <div class="modal">
            <h3>חיבור לענן ☁️</h3>
            <p style="color: #10b981; text-align: center;">🔒 האתר מחובר לענן בצורה מאובטחת – כל סרט שתמחקו או תוסיפו יישמר לכולם!</p>
            <div id="cloudAdminView" style="display:none; border-top: 1px solid var(--border); pt-10;">
                <input type="password" id="gitTokenInput" placeholder="הדבק GitHub Token...">
                <button class="btn-primary" style="width:100%; margin-top:8px;" onclick="saveGitHubToken()">שמור מפתח</button>
            </div>
            <button class="btn-cancel" onclick="closeModal('cloudModal')">סגור</button>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let moviesData = [];
        const REPO_OWNER = "asayelet7-hue";
        const REPO_NAME = "ayelet-movies";
        const FILE_PATH = "movies.json";

        // טעינת הנתונים מ-GitHub
        async function loadData() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${FILE_PATH}?t=${Date.now()}`);
                if (res.ok) moviesData = await res.json();
            } catch (e) {
                moviesData = JSON.parse(localStorage.getItem('my_movies_data') || '[]');
            }
            renderGrid();
        }

        // שמירה וסינכרון ל-GitHub
        async function syncToGitHub() {
            localStorage.setItem('my_movies_data', JSON.stringify(moviesData));
            renderGrid();

            const token = localStorage.getItem('github_token');
            if (!token) return;

            try {
                const fileRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await fileRes.json();

                await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "עדכון אוטומטי מהאתר",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(moviesData, null, 2)))),
                        sha: fileData.sha
                    })
                });
            } catch (e) {
                console.error("שגיאה בסנכרון לענן:", e);
            }
        }

        function renderGrid() {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = '';
            moviesData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.image || 'https://via.placeholder.com/300'}" alt="${item.title}">
                    <div class="card-body">
                        <strong>${item.title}</strong>
                        <button class="btn-primary" onclick="watchContent(${index})">צפייה</button>
                        ${isAdmin ? `<button class="btn-danger" onclick="deleteContent(${index})">מחק סרט ❌</button>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function deleteContent(index) {
            if (confirm('למחוק את הסרט הזה לכולם?')) {
                moviesData.splice(index, 1);
                await syncToGitHub();
            }
        }

        async function saveContent() {
            const title = document.getElementById('titleInput').value.trim();
            const type = document.getElementById('typeSelect').value;
            const image = document.getElementById('imageInput').value.trim();
            if (!title) return alert('נא להזין שם');

            let newItem = { title, type, image };
            if (type === 'movie') newItem.url = document.getElementById('movieUrlInput').value.trim();
            
            moviesData.push(newItem);
            await syncToGitHub();
            closeModal('addModal');
        }

        function watchContent(index) {
            const item = moviesData[index];
            if (item.url) window.open(item.url, '_blank');
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openAddModal() { openModal('addModal'); }
        function openCloudModal() {
            document.getElementById('cloudAdminView').style.display = isAdmin ? 'block' : 'none';
            openModal('cloudModal');
        }

        function saveGitHubToken() {
            const token = document.getElementById('gitTokenInput').value.trim();
            if (token) {
                localStorage.setItem('github_token', token);
                alert('המפתח נשמר!');
                closeModal('cloudModal');
            }
        }

        function toggleAdminLogin() {
            if (!isAdmin) {
                if (prompt('סיסמת מנהל:') === '1234') {
                    isAdmin = true;
                    document.getElementById('adminLoginBtn').innerText = 'מנהל מחובר';
                    renderGrid();
                }
            } else {
                isAdmin = false;
                document.getElementById('adminLoginBtn').innerText = 'התחבר כמנהל';
                renderGrid();
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
