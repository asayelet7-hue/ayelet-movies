<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הקרנה פרטית אילת 🍿</title>
    <meta name="description" content="אתר ההקרנות הפרטי של אילת. בואו לבחור סרטים וסדרות לצפייה משותפת מהנה.">
    <meta name="keywords" content="הקרנה פרטית אילת, סרטים לצפייה, סדרות מומלצות, הקרנה פרטית">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3418/3418886.png" type="image/x-icon">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #080a10; color: white; margin: 0; }
        header { background: #111; padding: 15px 5%; border-bottom: 2px solid #e50914; position: sticky; top: 0; z-index: 100; }
        .top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        .logo { font-size: 1.8rem; font-weight: bold; color: #e50914; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
        .search-container { flex-grow: 1; max-width: 400px; }
        .search-container input { width: 100%; margin: 0; padding: 8px 15px; background: #222; border: 1px solid #444; border-radius: 20px; color: white; box-sizing: border-box; }
        .search-container input:focus { border-color: #e50914; outline: none; }
        .auth-buttons { display: flex; gap: 10px; align-items: center; }
        .auth-buttons button, .btn-share { background: transparent; color: white; border: 1px solid white; padding: 5px 12px; border-radius: 5px; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .btn-share { background: #1e293b; border-color: #38bdf8; color: #38bdf8; }
        .btn-share:hover { background: #38bdf8; color: black; }
        
        .nav-links { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .nav-links button { background: #222; color: white; border: 2px solid transparent; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .nav-links button.active { background: #e50914; border-color: white; }
        .nav-links button.all-btn { background: #444; }
        .nav-links button.all-btn.active { background: #fff; color: black; border-color: #444; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 15px; padding: 20px 5%; }
        .movie-card { background: #1a1d24; padding: 12px; border-radius: 12px; border: 1px solid #333; text-align: center; font-size: 0.9rem; display: flex; flex-direction: column; justify-content: space-between; }
        .movie-card h3 { font-size: 1.1rem; margin: 10px 0 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; border-radius: 8px; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 150; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1d24; padding: 25px; z-index: 200; width: 90%; max-width: 450px; border: 2px solid #e50914; border-radius: 15px; box-shadow: 0 0 30px black; max-height: 85vh; overflow-y: auto; }
        
        .btn-action { background: #e50914; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        .btn-cancel { background: transparent; color: #aaa; border: none; margin-top: 5px; cursor: pointer; width: 100%; }
        .rating { color: #ffcc00; font-size: 1.1rem; margin: 5px 0; user-select: none; }
        .rating span { cursor: pointer; transition: transform 0.1s; display: inline-block; }
        .rating span:hover { transform: scale(1.2); }
        .avg-rating { font-size: 0.85rem; color: #aaa; margin-right: 5px; }
        
        .status-actions { display: flex; justify-content: space-around; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; }
        .status-btn { background: transparent; border: none; color: #666; cursor: pointer; font-size: 1.1rem; transition: 0.2s; display: flex; align-items: center; gap: 4px; }
        .status-btn.active-want { color: #38bdf8; font-weight: bold; }
        .status-btn.active-watched { color: #4ade80; font-weight: bold; }

        .btn-magic { background: linear-gradient(45deg, #ffcc00, #e50914); color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        input, select, textarea { width: 100%; margin: 5px 0; padding: 10px; box-sizing: border-box; background: #333; color: white; border: 1px solid #444; border-radius: 5px; }
        .loading { text-align: center; color: #aaa; padding: 50px; font-size: 1.2rem; grid-column: 1/-1; }
        
        .episode-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .episode-row input { margin: 0; }
        .episodes-box { background: #222; padding: 10px; border-radius: 5px; margin-top: 5px; border: 1px solid #444; }
        .watch-box-layout { display: flex; flex-direction: column; gap: 5px; flex: 1; }
    </style>
</head>
<body>

<div id="modalOverlay" class="modal-overlay" onclick="closeAllModals()"></div>

<header>
    <div class="top-row">
        <div class="logo"><span>🍿</span> MOVIE HUB</div>
        <div class="search-container">
            <input type="text" id="globalSearch" placeholder="חיפוש סרט או סדרה..." oninput="render()">
        </div>
        <div class="auth-buttons" id="authBox">
            <button class="btn-share" onclick="shareWebsite()">🔗 שיתוף האתר</button>
            <button onclick="openModal('loginModal')">התחברות</button>
            <button onclick="openModal('regModal')">הרשמה</button>
        </div>
    </div>
    <div class="nav-links">
        <button id="btn-all-types" class="all-btn active" onclick="clearTypeFilter(this)">הכל</button>
        <button data-type="סרט" onclick="toggleTypeFilter('סרט', this)">סרטים</button>
        <button data-type="סדרה" onclick="toggleTypeFilter('סדרה', this)">סדרות</button>
        <span style="color: #444; margin: 0 5px;">|</span>
        <button id="btn-all-cats" class="all-btn active" onclick="clearCatFilter(this)">הכל</button>
        <button data-cat="אקשן" onclick="toggleCatFilter('אקשן', this)">אקשן</button>
        <button data-cat="קומדיה" onclick="toggleCatFilter('קומדיה', this)">קומדיה</button>
        <button data-cat="פנטזיה" onclick="toggleCatFilter('פנטזיה', this)">פנטזיה</button>
        <button data-cat="רומנטיקה" onclick="toggleCatFilter('רומנטיקה', this)">רומנטיקה</button>
        <button data-cat="מדע בדיוני" onclick="toggleCatFilter('מדע בדיוני', this)">מדע בדיוני</button>
        <button data-cat="אימה" onclick="toggleCatFilter('אימה', this)">אימה</button>
        <button data-cat="דרמה" onclick="toggleCatFilter('דרמה', this)">דרמה</button>
        <button data-cat="אנימציה" onclick="toggleCatFilter('אנימציה', this)">אנימציה</button>
        <button data-cat="מתח" onclick="toggleCatFilter('מתח', this)">מתח</button>
        <button data-cat="דוקומנטרי" onclick="toggleCatFilter('דוקומנטרי', this)">דוקומנטרי</button>
        <button data-cat="משפחה" onclick="toggleCatFilter('משפחה', this)">משפחה 👨‍👩‍👧‍👦</button>
        <button data-cat="הרפתקאות" onclick="toggleCatFilter('הרפתקאות', this)">הרפתקאות 🗺️</button>
        <button data-cat="גיבורי על" onclick="toggleCatFilter('גיבורי על', this)">גיבורי על 🦸‍♂️</button>
        <button data-cat="סיפור אמיתי" onclick="toggleCatFilter('סיפור אמיתי', this)">סיפור אמיתי 📜</button>
    </div>
</header>

<div style="text-align: center; padding: 20px;">
    <h1 id="welcomeTitle">הקרנה פרטית אילת 🎬</h1>
    <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
        <button class="btn-action" style="width: auto; padding: 10px 30px;" onclick="openAddModal()">+ הוסף תוכן חדש</button>
        <button class="btn-magic" onclick="openModal('recModal')">✨ מה מתחשק לי?</button>
        <button id="personalRecBtn" class="btn-magic" style="display:none; background: #4ea8de;" onclick="getPersonalRecommendation()">👤 המלצה אישית</button>
    </div>
</div>

<div class="movie-grid" id="grid">
    <div class="loading">טוען סרטים מהענן... ☁️</div>
</div>

<div id="addModal" class="modal">
    <h3 id="modalFormTitle">הוספת סרט/סדרה חדשה</h3>
    <input type="hidden" id="edit-index">
    <input type="text" id="m-name" placeholder="שם הסרט/סדרה">
    <input type="text" id="m-img" placeholder="לינק לתמונת פוסטר">
    <textarea id="m-desc" placeholder="תקציר העלילה..."></textarea>
    <input type="text" id="m-trailer" placeholder="לינק לטריילר (YouTube)">
    
    <select id="m-type" onchange="toggleTypeFormFields()"><option value="סרט">סרט</option><option value="סדרה">סדרה</option></select>
    
    <div id="movieWatchField">
        <input type="text" id="m-watch" placeholder="לינק לצפייה ישירה (או לינק לכל הפרקים יחד)">
    </div>

    <div id="seriesEpisodesField" style="display:none;">
        <label style="font-size:0.85rem; color:#aaa; display:block; margin-top:5px;">חלוקה לפי פרקים בודדים (אופציונלי):</label>
        <div class="episodes-box" id="episodesContainer"></div>
        <button type="button" class="btn-action" style="background:#444; font-size:0.85rem; margin-top:5px;" onclick="addEpisodeRow('', '')">➕ הוסף פרק ספציפי</button>
    </div>

    <select id="m-cat">
        <option value="אקשן">אקשן</option>
        <option value="קומדיה">קומדיה</option>
        <option value="פנטזיה">פנטזיה</option>
        <option value="רומנטיקה">רומנטיקה</option>
        <option value="מדע בדיוני">מדע בדיוני</option>
        <option value="אימה">אימה</option>
        <option value="דרמה">דרמה</option>
        <option value="אנימציה">אנימציה</option>
        <option value="מתח">מתח</option>
        <option value="דוקומנטרי">דוקומנטרי</option>
        <option value="משפחה">משפחה</option>
        <option value="הרפתקאות">הרפתקאות</option>
        <option value="גיבורי על">גיבורי על</option>
        <option value="סיפור אמיתי">סיפור אמיתי</option>
    </select>
    <button class="btn-action" id="btnSubmitForm" onclick="saveMovie()">שמור בספריה</button>
    <button class="btn-cancel" onclick="closeModal('addModal')">ביטול וסגירה</button>
</div>

<div id="loginModal" class="modal">
    <h3>התחברות</h3>
    <input type="text" id="loginId" placeholder="אימייל או מספר טלפון">
    <button class="btn-action" onclick="handleAuth('login')">התחבר</button>
    <button class="btn-cancel" onclick="closeModal('loginModal')">סגור</button>
</div>

<div id="regModal" class="modal">
    <h3>הרשמה</h3>
    <input type="text" id="regName" placeholder="שם מלא">
    <input type="email" id="regEmail" placeholder="אימייל">
    <input type="tel" id="regPhone" placeholder="מספר טלפון">
    <button class="btn-action" onclick="handleAuth('reg')">הירשם</button>
    <button class="btn-cancel" onclick="closeModal('regModal')">סגור</button>
</div>

<div id="infoModal" class="modal">
    <div id="infoContent"></div>
    <button class="btn-action" onclick="closeModal('infoModal')">סגור</button>
</div>

<div id="recModal" class="modal">
    <h3>מה בא לך לראות?</h3>
    <input type="text" id="userMood" placeholder="תאר בקצרה (למשל: סרט מצחיק)...">
    <button class="btn-action" onclick="processMoodRec()">מצא לי!</button>
    <div id="recResult" style="margin-top:10px;"></div>
    <button class="btn-cancel" onclick="closeModal('recModal')">סגור</button>
</div>

<script>
    const FIREBASE_URL = "https://privatescreening-2c38d-default-rtdb.firebaseio.com/movies.json";

    let movies = [];
    let movieKeys = []; 
    let isAdmin = false;
    let isConnected = false;
    
    let selectedTypes = [];
    let selectedCats = [];
    
    let userWantToWatch = JSON.parse(localStorage.getItem('wantToWatch')) || [];
    let userWatched = JSON.parse(localStorage.getItem('watched')) || [];
    
    const ADMIN_DATA = { mail: "asayelet7@gmail.com", phone: "0587204600" };
    let openModalsList = [];

    async function loadMoviesFromCloud() {
        try {
            const response = await fetch(FIREBASE_URL);
            const data = await response.json();
            movies = [];
            movieKeys = [];
            
            if (data) {
                Object.keys(data).forEach(key => {
                    movieKeys.push(key);
                    movies.push(data[key]);
                });
            }
            render();
        } catch (error) {
            console.error(error);
            document.getElementById('grid').innerHTML = '<p style="grid-column:1/-1; text-align:center; color:red;">שגיאה בתקשורת עם הענן.</p>';
        }
    }

    async function updateMovieInCloud(index) {
        const firebaseKey = movieKeys[index];
        const singleMovieUrl = FIREBASE_URL.replace(".json", "/" + firebaseKey + ".json");
        await fetch(singleMovieUrl, {
            method: 'PUT',
            body: JSON.stringify(movies[index])
        });
        loadMoviesFromCloud();
    }

    function handleAuth(type) {
        let id = type === 'login' ? document.getElementById('loginId').value.trim() : (document.getElementById('regEmail').value.trim() || document.getElementById('regPhone').value.trim());
        if(!id) return alert("אנא מלא את שדות החובה");
        isConnected = true;
        if (id === ADMIN_DATA.mail || id === ADMIN_DATA.phone) isAdmin = true;
        document.getElementById('authBox').innerHTML = '<button class="btn-share" onclick="shareWebsite()">🔗 שיתוף האתר</button> <button onclick="location.reload()">התנתק</button>';
        document.getElementById('personalRecBtn').style.display = 'inline-block';
        closeModal('loginModal'); closeModal('regModal');
        render();
    }

    function shareWebsite() {
        navigator.clipboard.writeText(window.location.href);
        alert("הקישור לאתר הועתק! עכשיו אפשר לשלוח לחברים בוואטסאפ 🍿");
    }

    function shareMovieToWhatsApp(index) {
        const m = movies[index];
        let watchText = "";
        
        if (m.watch) watchText += "💻 *לינק כללי/כל הפרקים:* " + m.watch + "\n";
        if (m.type === 'סדרה' && m.episodes && m.episodes.length > 0) {
            watchText += "*פרקים בודדים:*\n" + m.episodes.map(ep => "• " + ep.name + ": " + ep.url).join('\n');
        }

        const text = "🍿 *המלצה מהקרנה פרטית אילת!* 🍿\n\n*שם:* " + m.name + "\n*סוג:* " + m.type + "\n*ז'אנר:* " + m.cat + "\n*תקציר:* " + (m.desc || 'אין תקציר') + "\n\n🎬 *לינק לטריילר:* " + (m.trailer || 'אין') + "\n" + watchText;
        const encodedText = encodeURIComponent(text);
        window.open("https://api.whatsapp.com/send?text=" + encodedText, '_blank');
    }

    function toggleStatus(index, statusType) {
        const movieName = movies[index].name;
        if(statusType === 'want') {
            if(userWantToWatch.includes(movieName)) {
                userWantToWatch = userWantToWatch.filter(name => name !== movieName);
            } else {
                userWantToWatch.push(movieName);
                userWatched = userWatched.filter(name => name !== movieName);
            }
        } else if(statusType === 'watched') {
            if(userWatched.includes(movieName)) {
                userWatched = userWatched.filter(name => name !== movieName);
            } else {
                userWatched.push(movieName);
                userWantToWatch = userWantToWatch.filter(name => name !== movieName);
            }
        }
        localStorage.setItem('wantToWatch', JSON.stringify(userWantToWatch));
        localStorage.setItem('watched', JSON.stringify(userWatched));
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        const searchQuery = document.getElementById('globalSearch').value.toLowerCase().trim();

        const filteredMovies = movies.filter(m => {
            const tM = selectedTypes.length === 0 || selectedTypes.includes(m.type);
            const cM = selectedCats.length === 0 || selectedCats.includes(m.cat);
            const sM = !searchQuery || (m.name && m.name.toLowerCase().includes(searchQuery));
            return tM && cM && sM;
        });

        if(filteredMovies.length === 0 && movies.length > 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #aaa; padding: 40px;">לא נמצאו תוצאות להתאמה הנוכחית...</p>';
            return;
        } else if (movies.length === 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #aaa; padding: 40px;">הספריה בענן ריקה.</p>';
            return;
        }

        let htmlString = "";
        for (let i = 0; i < filteredMovies.length; i++) {
            const m = filteredMovies[i];
            const actualIndex = movies.indexOf(m);
            const avg = m.rating > 0 ? ((m.rating + 4.1) / 2).toFixed(1) : "0.0";
            
            const isWant = userWantToWatch.includes(m.name) ? 'active-want' : '';
            const isWatched = userWatched.includes(m.name) ? 'active-watched' : '';

            let watchAreaHtml = '<div class="watch-box-layout">';
            if (m.type === 'סדרה') {
                if (m.watch) {
                    watchAreaHtml += '<a href="' + m.watch + '" target="_blank" style="background:#4ea8de; color:white; text-decoration:none; padding:6px; border-radius:5px; font-size:0.8rem; display:block; text-align:center;">📂 כל הפרקים</a>';
                }
                if (m.episodes && m.episodes.length > 0) {
                    watchAreaHtml += '<select style="margin:0; padding:6px; background:#2a6f97; color:white; border:none; border-radius:5px; font-size:0.8rem; text-align:center; cursor:pointer;" onchange="if(this.value) window.open(this.value, \'_blank\'); this.value=\'\';"><option value="">📺 פרק ספציפי...</option>';
                    for (let j = 0; j < m.episodes.length; j++) {
                        watchAreaHtml += '<option value="' + m.episodes[j].url + '">' + m.episodes[j].name + '</option>';
                    }
                    watchAreaHtml += '</select>';
                }
                if (!m.watch && (!m.episodes || m.episodes.length === 0)) {
                    watchAreaHtml += '<span style="color:#666; padding:6px; font-size:0.8rem;">אין קישורים</span>';
                }
            } else {
                watchAreaHtml += '<a href="' + (m.watch || '#') + '" target="_blank" style="background:#4ea8de; color:white; text-decoration:none; padding:8px; border-radius:5px; font-size:0.8rem; display:block; text-align:center;">צפייה</a>';
            }
            watchAreaHtml += '</div>';

            let starsHtml = "";
            for (let s = 1; s <= 5; s++) {
                const icon = (m.rating || 0) >= s ? '★' : '☆';
                starsHtml += '<span onclick="toggleRate(' + actualIndex + ', ' + s + ')">' + icon + '</span>';
            }

            let adminBtnHtml = isAdmin ? '<button onclick="deleteMovie(' + actualIndex + ')" style="background:#222; color:red; border:1px solid red; width:100%; cursor:pointer; padding:5px; border-radius:5px; margin-top:10px; font-size:0.8rem;">מחק סרט</button>' : '';

            htmlString += '<div class="movie-card">' +
                '<div>' +
                    '<img src="' + m.img + '" onerror="this.src=\'https://via.placeholder.com/190x240\'">' +
                    '<h3>' + m.name + '</h3>' +
                    '<div class="rating">' + starsHtml + '<span class="avg-rating">(' + avg + ')</span></div>' +
                    '<button class="btn-action" style="background:#333; margin-bottom:5px;" onclick="showDetails(' + actualIndex + ')">ℹ️ פרטים נוספים</button>' +
                    '<div style="display:flex; gap:5px; align-items:stretch;">' +
                        '<a href="' + m.trailer + '" target="_blank" style="background:#e50914; color:white; text-decoration:none; padding:8px; border-radius:5px
