<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הקרנה פרטית אילת</title>
    <meta name="description" content="אתר ההקרנות הפרטיות של אילת. בואו לצפות בסרטים וסדרות לצפייה ישירה משותפת מהנה.">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3418/3418886.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #080a10;
            --accent: #e50914;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--primary);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            cursor: pointer;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-cloud {
            background: #0284c7;
            color: white;
        }

        .btn-cancel {
            background: #475569;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .card-body {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 8px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .card-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Modal / החלוניות הקופצות */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 500px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 90vh;
            overflow-y: auto;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
        }

        .season-input-group {
            border: 1px dashed var(--border);
            padding: 10px;
            border-radius: 8px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-film"></i>
            <span>הקרנה פרטית אילת</span>
        </div>
        <div class="header-actions">
            <button class="btn-primary" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> הוסף תוכן</button>
            <button class="btn-cloud" onclick="openCloudModal()"><i class="fa-solid fa-cloud"></i> חיבור לענן</button>
            <button class="btn-cancel" id="adminLoginBtn" onclick="toggleAdminLogin()"><i class="fa-solid fa-user-shield"></i> התחבר כמנהל</button>
        </div>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 1rem;">הסרטים והסדרות שלנו</h2>
        <div id="contentGrid" class="grid">
            </div>
    </div>

    <div id="addModal" class="modal-overlay">
        <div class="modal">
            <h3>הוספת סרט / סדרה</h3>
            <input type="text" id="titleInput" placeholder="שם הסרט/הסדרה">
            <select id="typeSelect" onchange="handleTypeChange()">
                <option value="movie">סרט</option>
                <option value="series">סדרה</option>
            </select>
            <input type="url" id="imageInput" placeholder="קישור לתמונה (URL)">
            
            <div id="movieUrlContainer">
                <input type="url" id="movieUrlInput" placeholder="קישור בצפייה ישירה לסרט">
            </div>

            <div id="seriesContainer" style="display: none;">
                <label style="font-size: 0.9rem; color: var(--text-muted);">מספר עונות:</label>
                <input type="number" id="seasonsCount" value="1" min="1" max="20" onchange="generateSeasonInputs()">
                <div id="seasonsInputsContainer"></div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-primary" style="flex: 1;" onclick="saveContent()">שמור</button>
                <button class="btn-cancel" style="flex: 1;" onclick="closeModal('addModal')">ביטול</button>
            </div>
        </div>
    </div>

    <div id="cloudModal" class="modal-overlay">
        <div class="modal">
            <h3>חיבור לענן ☁️</h3>
            
            <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; padding: 15px; border-radius: 8px;">
                <p style="color: #10b981; font-weight: bold; margin: 0; font-size: 0.95rem; text-align: center;">
                    🔒 האתר מחובר לענן בצורה מאובטחת – כל סרט שתוסיפו יישמר לכולם!
                </p>
            </div>

            <div id="cloudAdminView" style="display:none; border-top: 1px solid var(--border); margin-top:10px; padding-top:10px;">
                <p style="font-size:0.85rem; color:#ffcc00; text-align:right; margin-bottom:5px;">👑 <strong>אזור מנהלת:</strong> עדכון מפתח GitHub Token</p>
                <input type="password" id="gitTokenInput" placeholder="הדבק כאן את ה-GitHub Token שלך...">
                <button class="btn-primary" style="background:#10b981; width:100%; margin-top:8px;" onclick="saveGitHubToken()">שמור מפתח מחדש ✔️</button>
            </div>

            <button class="btn-cancel" style="width:100%; margin-top:10px;" onclick="closeModal('cloudModal')">סגור</button>
        </div>
    </div>

    <script>
        // משתנים גלובליים
        let isAdmin = false;
        let contents = JSON.parse(localStorage.getItem('my_movies_data') || '[]');
        const DEFAULT_TOKEN = ""; // מפתח גיבוי במידה והוגדר

        function init() {
            renderGrid();
            generateSeasonInputs();
        }

        function renderGrid() {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = '';

            if (contents.length === 0) {
                grid.innerHTML = '<p style="color: var(--text-muted);">אין עדיין תכנים. לחצו על "הוסף תוכן" כדי להתחיל!</p>';
                return;
            }

            contents.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.image || 'https://via.placeholder.com/300x400?text=אין+תמונה'}" alt="${item.title}">
                    <div class="card-body">
                        <div class="card-title">${item.title}</div>
                        <div class="card-meta">${item.type === 'series' ? 'סדרה' : 'סרט'}</div>
                        <button class="btn-primary" onclick="watchContent(${index})" style="margin-top:auto;">צפייה</button>
                        ${isAdmin ? `<button class="btn-danger" onclick="deleteContent(${index})" style="margin-top:5px;">מחק</button>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function handleTypeChange() {
            const type = document.getElementById('typeSelect').value;
            if (type === 'series') {
                document.getElementById('movieUrlContainer').style.display = 'none';
                document.getElementById('seriesContainer').style.display = 'block';
            } else {
                document.getElementById('movieUrlContainer').style.display = 'block';
                document.getElementById('seriesContainer').style.display = 'none';
            }
        }

        function generateSeasonInputs() {
            const count = parseInt(document.getElementById('seasonsCount').value) || 1;
            const container = document.getElementById('seasonsInputsContainer');
            container.innerHTML = '';

            for (let i = 1; i <= count; i++) {
                const div = document.createElement('div');
                div.className = 'season-input-group';
                div.innerHTML = `
                    <label style="font-size:0.8rem; color: var(--text-muted);">קישור לעונה ${i}:</label>
                    <input type="url" class="season-url-input" placeholder="הדבק קישור לעונה ${i}">
                `;
                container.appendChild(div);
            }
        }

        function saveContent() {
            const title = document.getElementById('titleInput').value.trim();
            const type = document.getElementById('typeSelect').value;
            const image = document.getElementById('imageInput').value.trim();

            if (!title) {
                alert('אנא הזן שם');
                return;
            }

            let newItem = { title, type, image };

            if (type === 'movie') {
                newItem.url = document.getElementById('movieUrlInput').value.trim();
            } else {
                const seasonInputs = document.querySelectorAll('.season-url-input');
                newItem.seasons = Array.from(seasonInputs).map(input => input.value.trim());
            }

            contents.push(newItem);
            localStorage.setItem('my_movies_data', JSON.stringify(contents));
            renderGrid();
            closeModal('addModal');
            
            // איפוס שדות
            document.getElementById('titleInput').value = '';
            document.getElementById('imageInput').value = '';
            document.getElementById('movieUrlInput').value = '';
        }

        function watchContent(index) {
            const item = contents[index];
            if (item.type === 'movie') {
                if (item.url) window.open(item.url, '_blank');
                else alert('לא הוגדר קישור לסרט זה');
            } else {
                if (item.seasons && item.seasons.length > 0) {
                    let seasonChoice = prompt(`לבחירת עונה (1 - ${item.seasons.length}):`, '1');
                    let sNum = parseInt(seasonChoice);
                    if (sNum && item.seasons[sNum - 1]) {
                        window.open(item.seasons[sNum - 1], '_blank');
                    } else if (seasonChoice) {
                        alert('עונה לא קיימת או שלא הוגדר עבורה קישור');
                    }
                }
            }
        }

        function deleteContent(index) {
            if (confirm('בטוח שברצונך למחוק?')) {
                contents.splice(index, 1);
                localStorage.setItem('my_movies_data', JSON.stringify(contents));
                renderGrid();
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openAddModal() { openModal('addModal'); }

        function openCloudModal() {
            const adminView = document.getElementById('cloudAdminView');
            if (isAdmin) {
                adminView.style.display = 'block';
                document.getElementById('gitTokenInput').value = localStorage.getItem('github_token') || DEFAULT_TOKEN;
            } else {
                adminView.style.display = 'none';
            }
            openModal('cloudModal');
        }

        function saveGitHubToken() {
            const token = document.getElementById('gitTokenInput').value.trim();
            if (token) {
                localStorage.setItem('github_token', token);
                alert('המפתח נשמר בהצלחה!');
                closeModal('cloudModal');
            }
        }

        function toggleAdminLogin() {
            if (!isAdmin) {
                let pass = prompt('הזן סיסמת מנהל:');
                if (pass === '1234') { // תוכל לשנות סיסמה זו במידת הצורך
                    isAdmin = true;
                    document.getElementById('adminLoginBtn').innerText = 'מנהל מחובר (התנתק)';
                    alert(' התחברת בהצלחה כמנהלת!');
                    renderGrid();
                } else if(pass) {
                    alert('סיסמה שגויה!');
                }
            } else {
                isAdmin = false;
                document.getElementById('adminLoginBtn').innerText = 'התחבר כמנהל';
                renderGrid();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
